<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#0d1117" rx="6"/>

  <!-- Name -->
  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="42" font-weight="700" fill="#e6edf3">
    André Ahlert
  </text>

  <!-- Underline -->
  <rect x="310" y="95" width="280" height="2" rx="1" fill="url(#accent)" opacity="0.6">
    <animate attributeName="width" values="0;280" dur="1.2s" fill="freeze"/>
    <animate attributeName="x" values="450;310" dur="1.2s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="16" fill="#8b949e">
    Founder @ AEX Partners
  </text>

  <!-- Tagline -->
  <text x="450" y="165" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" fill="#58a6ff" opacity="0.8">
    developer tools · htmx ecosystem · open source
  </text>
</svg>
